<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N3 — Simulasi Ujian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAE6DC;
    --paper-card:#FAF8F3;
    --paper-card-2:#F2EFE6;
    --ink:#23211C;
    --ink-soft:#5E5A4E;
    --ink-faint:#8B8678;
    --indigo:#2C3A55;
    --indigo-soft:#46587A;
    --shu:#B23A26;
    --shu-deep:#8C2C1C;
    --shu-bg:#F3E3DD;
    --success:#3F6B49;
    --success-bg:#E2EAE1;
    --warn-bg:#F3E9D5;
    --warn-ink:#7A5A1E;
    --border:#D9D3C2;
    --border-soft:#E5E0D4;
    --radius-s:6px;
    --radius-m:10px;
    --radius-l:16px;
    --font-display:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
    --font-body:'Inter','Noto Sans JP',sans-serif;
    --font-jp:'Noto Sans JP',sans-serif;
    --font-jp-serif:'Noto Serif JP',serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:760px;
    margin:0 auto;
    padding:28px 18px 80px;
  }
  .eyebrow{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin:0 0 6px;
  }
  h1,h2,h3{font-family:var(--font-display);font-weight:700;margin:0;}
  .hero-title{
    font-size:42px;
    line-height:1.15;
    color:var(--ink);
    margin-bottom:4px;
  }
  .hero-sub{
    font-family:var(--font-body);
    font-size:15px;
    color:var(--ink-soft);
    margin:0 0 22px;
  }
  .card{
    background:var(--paper-card);
    border:1px solid var(--border);
    border-radius:var(--radius-l);
    padding:20px 22px;
    margin-bottom:16px;
  }
  .card-tight{padding:16px 18px;}
  .section-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:18px;
  }
  @media (max-width:540px){.section-grid{grid-template-columns:1fr;}}
  .section-tile{
    background:var(--paper-card);
    border:1px solid var(--border);
    border-radius:var(--radius-m);
    padding:16px 16px;
  }
  .section-tile .jp{
    font-family:var(--font-jp);
    font-weight:700;
    font-size:13px;
    color:var(--indigo);
    letter-spacing:.04em;
  }
  .section-tile .name{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:700;
    margin:2px 0 8px;
  }
  .section-tile .meta{
    display:flex;
    gap:14px;
    font-size:13px;
    color:var(--ink-soft);
    font-family:var(--font-mono);
  }
  .note{
    background:var(--warn-bg);
    border:1px solid #E3D4AC;
    border-radius:var(--radius-m);
    padding:14px 16px;
    font-size:13.5px;
    color:var(--warn-ink);
    margin-bottom:18px;
  }
  .note b{color:var(--ink);}
  .btn{
    font-family:var(--font-body);
    font-weight:600;
    font-size:15px;
    border:none;
    border-radius:999px;
    padding:13px 28px;
    cursor:pointer;
    transition:transform .08s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--shu);color:#fff;}
  .btn-primary:hover{background:var(--shu-deep);}
  .btn-primary:disabled{background:#C9C2B0;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--indigo);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--paper-card-2);}
  .btn-block{width:100%;display:block;}
  .history-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 0;
    border-bottom:1px solid var(--border-soft);
    font-size:13.5px;
  }
  .history-row:last-child{border-bottom:none;}
  .history-row .date{color:var(--ink-soft);font-family:var(--font-mono);font-size:12px;}
  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:3px 10px;
    border-radius:999px;
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:600;
  }
  .pill-ok{background:var(--success-bg);color:var(--success);}
  .pill-mid{background:var(--warn-bg);color:var(--warn-ink);}
  .pill-low{background:var(--shu-bg);color:var(--shu-deep);}

  /* exam screen */
  .topbar{
    position:sticky;
    top:0;
    background:var(--paper);
    padding:14px 0 12px;
    margin-bottom:6px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:10;
  }
  .topbar .sec-label{font-family:var(--font-display);font-size:16px;font-weight:700;}
  .topbar .sec-sub{font-family:var(--font-jp);font-size:12px;color:var(--ink-soft);}
  .timer{
    font-family:var(--font-mono);
    font-weight:600;
    font-size:20px;
    padding:7px 16px;
    border-radius:999px;
    background:var(--indigo);
    color:#fff;
    letter-spacing:.03em;
  }
  .timer.danger{background:var(--shu);animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.72;}}
  .progress-line{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--ink-faint);
    margin:10px 0 18px;
  }
  .qgroup{margin-bottom:26px;}
  .qgroup-tag{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--indigo-soft);
    margin-bottom:6px;
  }
  .passage-box{
    background:var(--paper-card-2);
    border:1px solid var(--border);
    border-left:3px solid var(--indigo);
    border-radius:var(--radius-m);
    padding:16px 18px;
    margin-bottom:14px;
    font-family:var(--font-jp-serif);
    font-size:15.5px;
    line-height:1.95;
    white-space:pre-wrap;
  }
  .notice-box{
    background:#fff;
    border:1px solid var(--border);
    border-radius:var(--radius-m);
    padding:16px 18px;
    margin-bottom:14px;
    font-family:var(--font-jp);
    font-size:14.5px;
    line-height:1.85;
    white-space:pre-wrap;
  }
  .q-card{
    background:var(--paper-card);
    border:1px solid var(--border);
    border-radius:var(--radius-m);
    padding:16px 18px;
    margin-bottom:10px;
  }
  .q-num{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--ink-faint);
    margin-bottom:6px;
  }
  .q-prompt{
    font-family:var(--font-jp);
    font-size:16px;
    margin-bottom:14px;
    line-height:1.75;
  }
  .q-prompt u{text-decoration-color:var(--shu);text-decoration-thickness:2px;}
  .choices{display:flex;flex-direction:column;gap:8px;}
  .choice{
    display:flex;
    align-items:center;
    gap:11px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:var(--radius-s);
    cursor:pointer;
    background:#fff;
    transition:background .12s, border-color .12s;
    font-family:var(--font-jp);
    font-size:15px;
  }
  .choice:hover{border-color:var(--indigo-soft);}
  .choice.selected{
    border-color:var(--shu);
    background:var(--shu-bg);
  }
  .bubble{
    flex:0 0 26px;
    width:26px;height:26px;
    border-radius:50%;
    border:1.5px solid var(--ink-faint);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:600;
    color:var(--ink-soft);
    background:#fff;
  }
  .choice.selected .bubble{
    border-color:var(--shu);
    background:var(--shu);
    color:#fff;
  }
  .sticky-footer{
    position:sticky;
    bottom:0;
    background:var(--paper);
    padding:14px 0 4px;
    border-top:1px solid var(--border);
    margin-top:18px;
  }
  .finish-meta{
    font-size:12.5px;
    color:var(--ink-faint);
    text-align:center;
    margin-top:8px;
    font-family:var(--font-mono);
  }

  /* transition / results */
  .transition-wrap, .results-wrap{text-align:center;padding:30px 0;}
  .score-big{
    font-family:var(--font-display);
    font-size:56px;
    font-weight:700;
    color:var(--indigo);
    margin:6px 0;
  }
  .score-tag{font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);}
  .breakdown-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--border-soft);
    font-size:14px;
  }
  .breakdown-row:last-child{border-bottom:none;}
  .bar-bg{
    flex:1;
    height:6px;
    background:var(--border-soft);
    border-radius:3px;
    margin:0 12px;
    overflow:hidden;
  }
  .bar-fill{height:100%;background:var(--indigo);border-radius:3px;}
  .type-name{font-family:var(--font-jp);font-size:13.5px;width:170px;flex:0 0 170px;color:var(--ink-soft);}
  .type-frac{font-family:var(--font-mono);font-size:12.5px;width:46px;text-align:right;flex:0 0 46px;}
  .actions-row{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================== DATA ============================== */
var SECTIONS = [
  { id:'mojigoi', name:'Mojigoi', nameJp:'文字・語彙', duration: 30*60 },
  { id:'bunpou_dokkai', name:'Bunpou-dokkai', nameJp:'文法・読解', duration: 70*60 }
];

var TYPE_LABEL = {
  kanji_reading:'Kanji reading', orthography:'Orthography', contextual:'Contextual expression',
  paraphrase:'Paraphrase', usage:'Usage', grammar_form:'Grammar form', sentence_comp:'Sentence composition',
  text_grammar:'Text grammar', reading_short:'Reading (short)', reading_mid:'Reading (mid)',
  reading_long:'Reading (long)', info_retrieval:'Information retrieval'
};

/* ---- VOCAB (mojigoi) : flat question pools ---- */
var POOL_kanji_reading = [
  {p:'彼は会社の<u>経営</u>に関する重要な決定を下した。', c:['けいえい','けいよう','きょうえい','けいせい'], a:0, w:2},
  {p:'この薬は<u>副作用</u>がほとんどありません。', c:['ふくさよう','ふっさよう','ふくさくよう','ふくさゆう'], a:0, w:3},
  {p:'工場の生産量は去年より<u>増加</u>した。', c:['ぞうか','ぞうが','そうか','ぞうき'], a:0, w:1},
  {p:'彼は<u>責任</u>を持ってこの仕事を続けるつもりだ。', c:['せきにん','せきじん','ちゃくにん','せいにん'], a:0, w:2},
  {p:'このレストランは特に魚料理が<u>有名</u>だ。', c:['ゆうめい','ゆうみょう','うめい','ゆうな'], a:0, w:1},
  {p:'彼は試験の結果に<u>満足</u>しているようだ。', c:['まんぞく','まんそく','みつぞく','まんぞうく'], a:0, w:2}
];
var POOL_orthography = [
  {p:'かいぎに　おくれて　しまった。', c:['会議','会義','開議','会儀'], a:0, w:1},
  {p:'しょくじの　あとで　さんぽに　いきます。', c:['食事','食時','飯事','食仕'], a:0, w:1},
  {p:'かれは　とても　しんせつな　ひとです。', c:['親切','新切','親節','信切'], a:0, w:2},
  {p:'この　もんだいは　かんたんに　かいけつできる。', c:['解決','解結','開決','解訣'], a:0, w:2},
  {p:'わたしの　しゅみは　しゃしんを　とることです。', c:['趣味','趣未','趨味','趣昧'], a:0, w:2},
  {p:'でんしゃが　こしょうして　とまった。', c:['故障','古障','故章','個障'], a:0, w:3}
];
var POOL_contextual = [
  {p:'会議の前に資料を＿＿＿しておいてください。', c:['準備','予防','訓練','整理'], a:0, w:1},
  {p:'＿＿＿な説明だったので、すぐに理解できた。', c:['明快','真剣','丁寧','熱心'], a:0, w:3},
  {p:'駅まで＿＿＿歩いて10分くらいです。', c:['だいたい','かならず','とくに','さらに'], a:0, w:1},
  {p:'急に雨が降ってきたので、＿＿＿で帰った。', c:['大急ぎ','大丈夫','大体','大変'], a:0, w:2},
  {p:'彼は約束の時間に＿＿＿来なかった。', c:['結局','そろそろ','やはり','ところで'], a:0, w:2},
  {p:'部長は出張で＿＿＿会社にいない。', c:['しばらく','たびたび','めったに','かならず'], a:0, w:1}
];
var POOL_paraphrase = [
  {p:'彼はいつも約束を守る、<u>誠実な</u>人だ。', c:['まじめな','のんきな','だらしない','そっけない'], a:0, w:2},
  {p:'彼女はその知らせを聞いて、<u>がっかりした</u>。', c:['しつぼうした','よろこんだ','おどろいた','おこった'], a:0, w:1},
  {p:'この問題については、彼の意見に<u>したがう</u>ことにした。', c:['むかう','あらそう','きく','はなれる'], a:2, w:3},
  {p:'彼の話は<u>単純</u>すぎて、つまらなかった。', c:['ふくざつ','かんたん','じみ','へん'], a:1, w:1},
  {p:'急な変更で、社員たちは<u>戸惑った</u>。', c:['こまった','よろこんだ','おこった','やすんだ'], a:0, w:2}
];
var POOL_usage = [
  {w_:'出発する', s:['電車は9時に駅を出発する。','この本は来月、出発する予定です。','母は毎朝、出発に部屋を掃除する。','彼は出発な性格で、すぐ怒る。'], a:0, w:2},
  {w_:'片付ける', s:['テーブルの上を片付けてから、ご飯を食べましょう。','彼は試験の結果を片付けて、がっかりした。','彼女は来月、新しい仕事を片付けるそうだ。','このニュースはみんなを片付けさせた。'], a:0, w:2},
  {w_:'比較する', s:['二つの商品の値段を比較してから買うことにした。','彼は毎日、運動を比較している。','子供たちは公園で比較して遊んでいた。','母は朝ごはんを比較するのが好きだ。'], a:0, w:1},
  {w_:'役立つ', s:['この辞書は日本語の勉強にとても役立つ。','彼は毎朝、公園を役立っている。','その映画は彼を役立たせた。','彼女は忙しくて、家事を役立てない。'], a:0, w:2},
  {w_:'申し込む', s:['来週のセミナーに申し込むつもりだ。','彼は宿題を申し込むのが遅かった。','母は新しい料理を申し込んでみた。','彼女はその意見に申し込んだ。'], a:0, w:1}
];

/* ---- GRAMMAR + READING (bunpou-dokkai) ---- */
var POOL_grammar_form = [
  {p:'子供の頃、よく公園で＿＿＿ものだ。', c:['遊んだ','遊んでいる','遊ぶ','遊んでいた'], a:0, w:2},
  {p:'このレストランは値段が高い＿＿＿、味はそれほどよくない。', c:['にしては','としては','について','によって'], a:0, w:3},
  {p:'天気予報によると、明日は雨が降る＿＿＿。', c:['そうだ','ようだ','らしい','みたいだ'], a:0, w:2},
  {p:'いくら説明しても、彼は＿＿＿としなかった。', c:['理解しよう','理解する','理解して','理解した'], a:0, w:2},
  {p:'田中さんは休む＿＿＿、会社に来た。', c:['ことなく','ことに','ことには','こととして'], a:0, w:3},
  {p:'子供＿＿＿、そんなことぐらい知っている。', c:['でも','なら','として','さえ'], a:0, w:1},
  {p:'このプロジェクトが成功する＿＿＿、みんなの努力が必要だ。', c:['ためには','ために','としては','とすれば'], a:0, w:2},
  {p:'彼の話を聞け＿＿＿聞くほど、疑問が増えてきた。', c:['ば','ると','たら','なら'], a:0, w:3}
];
var POOL_sentence_comp = [
  {p:'このアプリは＿＿＿使いやすいと評判だ。', c:['操作が簡単で、デザインもよく','操作を簡単に、デザインもよくて','操作が簡単なのに、デザインが悪くて','操作も簡単じゃないし、デザインもよくない'], a:0, w:2},
  {p:'彼は＿＿＿、最後まで諦めなかった。', c:['何度失敗しても','一度も失敗しなかったので','すぐに諦めようとして','簡単に成功したから'], a:0, w:2},
  {p:'健康のためには、＿＿＿、十分な睡眠も大切だ。', c:['バランスのよい食事だけでなく','バランスのよい食事だけがあれば','バランスの悪い食事のために','バランスをよくする食事の後で'], a:0, w:3},
  {p:'この資料は＿＿＿、来週までに提出してください。', c:['確認した上で','確認しているところで','確認したばかりで','確認するように'], a:0, w:2},
  {p:'彼女は仕事が忙しい＿＿＿、家族との時間を大切にしている。', c:['にもかかわらず','になるとすぐに','ばかりでなく','によると'], a:0, w:2}
];

var GROUP_text_grammar = [{
  id:'tg1',
  passage:'最近、健康のために走ることを始めました。最初は5分も走ると（１）疲れてしまいましたが、毎日少しずつ続けていたら、だんだん体が慣れてきました。今では30分くらい走っても、（２）疲れません。走った後は気持ちがよくて、（３）、夜もよく眠れるようになりました。これからも、無理をしない（４）、走り続けたいと思っています。',
  blanks:[
    {n:1, c:['すぐに','たまに','やっと','さらに'], a:0, w:1},
    {n:2, c:['あまり','とても','かなり','やや'], a:0, w:2},
    {n:3, c:['それに','それで','それでも','それなら'], a:0, w:2},
    {n:4, c:['範囲で','ように','場合に','うえで'], a:0, w:3}
  ]
}];

var GROUP_reading_short = [
  { id:'sp1', passage:'お知らせ\n来月から、図書館の開館時間が変わります。今までは午前9時から午後6時まででしたが、来月からは午前9時から午後8時まで利用できるようになります。利用者の皆様にはより便利にご利用いただけるかと思います。',
    q:{p:'来月から、図書館は何時まで利用できるようになりますか。', c:['午後6時まで','午後7時まで','午後8時まで','午後9時まで'], a:2, w:1} },
  { id:'sp2', passage:'先週、友人に勧められて新しいカフェに行ってみた。店内は静かで、ゆっくり読書をするのにちょうどいい雰囲気だった。コーヒーの種類も多く、どれを選べばいいか迷ってしまうほどだった。また近いうちに行きたいと思う。',

/* ============================== ENGINE ============================== */
function shuffle(arr){
  var a = arr.slice();
  for (var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
function sample(arr,n){ return shuffle(arr).slice(0, Math.min(n, arr.length)); }

var qidCounter = 0;
function nextId(){ qidCounter+=1; return 'q'+qidCounter; }

function shuffleChoiceSet(choices, answerIndex){
  var idxs = choices.map(function(_,i){return i;});
  idxs = shuffle(idxs);
  var newChoices = idxs.map(function(i){return choices[i];});
  var newAnswer = idxs.indexOf(answerIndex);
  return {choices:newChoices, answer:newAnswer};
}

function buildStandaloneItem(type, raw, prompt, rawChoices, rawAnswer){
  var sc = shuffleChoiceSet(rawChoices, rawAnswer);
  return { id:nextId(), kind:'single', type:type, prompt:prompt, choices:sc.choices, answer:sc.answer, weight:raw.w };
}

function buildVocabPool(){
  var items = [];
  sample(POOL_kanji_reading, 4).forEach(function(r){ items.push(buildStandaloneItem('kanji_reading', r, r.p, r.c, r.a)); });
  sample(POOL_orthography, 4).forEach(function(r){ items.push(buildStandaloneItem('orthography', r, r.p, r.c, r.a)); });
  sample(POOL_contextual, 4).forEach(function(r){ items.push(buildStandaloneItem('contextual', r, r.p, r.c, r.a)); });
  sample(POOL_paraphrase, 3).forEach(function(r){ items.push(buildStandaloneItem('paraphrase', r, r.p, r.c, r.a)); });
  sample(POOL_usage, 3).forEach(function(r){
    var sc = shuffleChoiceSet(r.s, r.a);
    items.push({ id:nextId(), kind:'usage', type:'usage', word:r.w_, choices:sc.choices, answer:sc.answer, weight:r.w });
  });
  return shuffle(items);
}

function buildGrammarReadingGroups(){
  var groups = [];

  sample(POOL_grammar_form, 5).forEach(function(r){
    groups.push({ id:nextId(), kind:'single', type:'grammar_form', items:[buildStandaloneItem('grammar_form', r, r.p, r.c, r.a)] });
  });
  sample(POOL_sentence_comp, 3).forEach(function(r){
    groups.push({ id:nextId(), kind:'single', type:'sentence_comp', items:[buildStandaloneItem('sentence_comp', r, r.p, r.c, r.a)] });
  });

  GROUP_text_grammar.forEach(function(g){
    var items = g.blanks.map(function(b){
      var sc = shuffleChoiceSet(b.c, b.a);
      return { id:nextId(), kind:'blank', type:'text_grammar', blankNum:b.n, choices:sc.choices, answer:sc.answer, weight:b.w };
    });
    groups.push({ id:nextId(), kind:'passage', type:'text_grammar', passage:g.passage, items:items });
  });

  sample(GROUP_reading_short, 2).forEach(function(g){
    var sc = shuffleChoiceSet(g.q.c, g.q.a);
    groups.push({ id:nextId(), kind:'passage', type:'reading_short', passage:g.passage,
      items:[{ id:nextId(), kind:'single', type:'reading_short', prompt:g.q.p, choices:sc.choices, answer:sc.answer, weight:g.q.w }] });
  });

  sample(GROUP_reading_mid, 1).forEach(function(g){
    var items = g.qs.map(function(q){
      var sc = shuffleChoiceSet(q.c, q.a);
      return { id:nextId(), kind:'single', type:'reading_mid', prompt:q.p, choices:sc.choices, answer:sc.answer, weight:q.w };
    });
    groups.push({ id:nextId(), kind:'passage', type:'reading_mid', passage:g.passage, items:items });
  });

  GROUP_reading_long.forEach(function(g){
    var items = g.qs.map(function(q){
      var sc = shuffleChoiceSet(q.c, q.a);
      return { id:nextId(), kind:'single', type:'reading_long', prompt:q.p, choices:sc.choices, answer:sc.answer, weight:q.w };
    });
    groups.push({ id:nextId(), kind:'passage', type:'reading_long', passage:g.passage, items:items });
  });

  GROUP_info_retrieval.forEach(function(g){
    var items = g.qs.map(function(q){
      var sc = shuffleChoiceSet(q.c, q.a);
      return { id:nextId(), kind:'single', type:'info_retrieval', prompt:q.p, choices:sc.choices, answer:sc.answer, weight:q.w };
    });
    groups.push({ id:nextId(), kind:'passage', type:'info_retrieval', passage:g.passage, items:items });
  });

  return shuffle(groups);
}

  var d1 = state.sectionData.bunpou_dokkai;

    d1.forEach(function(g){

    });

/* ============================== STORAGE ============================== */
function loadHistory(cb){
  if (!window.storage){ cb([]); return; }
  window.storage.get('jlpt_n3_attempts', false).then(function(res){
    var arr = [];
    try { arr = res && res.value ? JSON.parse(res.value) : []; } catch(e){ arr = []; }
    cb(arr);
  }).catch(function(){ cb([]); });
}
function saveAttempt(record){
  if (!window.storage) return;
  loadHistory(function(arr){
    arr.unshift(record);
    arr = arr.slice(0, 8);
    window.storage.set('jlpt_n3_attempts', JSON.stringify(arr), false).catch(function(){});
  });
}

/* ============================== SCORING ============================== */
function scoreSection(sectionId){
  var items = [];
  if (sectionId === 'mojigoi'){
    items = state.sectionData.mojigoi || [];
  } else {
    (state.sectionData.bunpou_dokkai||[]).forEach(function(g){ items = items.concat(g.items); });
  }
  var totalW = 0, gotW = 0;
  var byType = {};
  items.forEach(function(it){
    var w = it.weight;
    totalW += w;
    var correct = state.answers[it.id] === it.answer;
    if (correct) gotW += w;
    if (!byType[it.type]) byType[it.type] = {got:0, total:0, n:0, correctN:0};
    byType[it.type].total += w;
    byType[it.type].n += 1;
    if (correct){ byType[it.type].got += w; byType[it.type].correctN += 1; }
  });
  var pct = totalW>0 ? Math.round((gotW/totalW)*100) : 0;
  return { pct:pct, totalW:totalW, gotW:gotW, byType:byType };
}

function band(pct){
  if (pct >= 80) return {label:'Kuat — siap latihan timed-mode penuh', cls:'pill-ok'};
  if (pct >= 60) return {label:'Cukup — perlu latihan tertarget', cls:'pill-mid'};
  return {label:'Perlu diperkuat dulu', cls:'pill-low'};
}

/* ============================== TIMER ============================== */
function startSectionTimer(){
  var sec = SECTIONS[state.sectionIndex];
  state.sectionEndAt = Date.now() + sec.duration*1000;
  if (state.timerHandle) clearInterval(state.timerHandle);
  state.timerHandle = setInterval(tick, 250);
}
function remainingSeconds(){
  return Math.max(0, Math.round((state.sectionEndAt - Date.now())/1000));
}
function tick(){
  var r = remainingSeconds();
  var timerEl = document.getElementById('timerDisplay');
  if (timerEl){
    timerEl.textContent = fmtTime(r);
    timerEl.classList.toggle('danger', r <= 120);
  }
  if (r <= 0){
    clearInterval(state.timerHandle);
    finishSection(true);
  }
}
function fmtTime(s){
  var m = Math.floor(s/60), sec = s%60;
  return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
}

/* ============================== FLOW ============================== */
function startExam(){
  qidCounter = 0;
  state.answers = {};
  state.sectionIndex = 0;
  state.sectionData.mojigoi = buildVocabPool();
  state.sectionData.bunpou_dokkai = null;
  state.phase = 'exam';
  render();
  startSectionTimer();
}

function finishSection(auto){
  clearInterval(state.timerHandle);
  if (state.sectionIndex === 0){
    state.phase = 'transition';
    render();
  } else {
    finalizeResults();
  }
}

function goToNextSection(){
  state.sectionIndex = 1;
  state.sectionData.bunpou_dokkai = buildGrammarReadingGroups();
  state.phase = 'exam';
  render();
  startSectionTimer();
}

function finalizeResults(){
  var s0 = scoreSection('mojigoi');
  var s1 = scoreSection('bunpou_dokkai');
  var overall = Math.round((s0.gotW + s1.gotW) / (s0.totalW + s1.totalW) * 100);
  state.lastScore = { s0:s0, s1:s1, overall:overall };
  saveAttempt({ date:new Date().toISOString(), vocab:s0.pct, grammar:s1.pct, overall:overall });
  state.phase = 'results';
  render();
}

function selectAnswer(id, idx){
  state.answers[id] = idx;
  render();
}

function restart(){
  state.phase = 'start';
  render();
}

  var keys = Object.keys(byType);
  var html = '';
  keys.forEach(function(k){
    var t = byType[k];
    var pct = t.total>0 ? Math.round((t.got/t.total)*100) : 0;
    html += '<div class="breakdown-row"><span class="type-name">'+esc(TYPE_LABEL[k])+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;"></div></div><span class="type-frac">'+t.correctN+'/'+t.n+'</span></div>';
  });
  return html;
}

function renderResults(){
  var r = state.lastScore;
  var b = band(r.overall);
  var html = '<div class="results-wrap">';
  html += '<p class="eyebrow">Hasil latihan</p>';
  html += '<div class="score-big">'+r.overall+'%</div>';
  html += '<div class="score-tag">skor gabungan, dibobot tingkat kesulitan</div>';
  html += '<div style="margin-top:14px;"><span class="pill '+b.cls+'">'+b.label+'</span></div>';
  html += '</div>';

  html += '<div class="card"><h3 style="font-size:15px;margin-bottom:10px;">Mojigoi — '+r.s0.pct+'%</h3>'+renderTypeRows(r.s0.byType)+'</div>';
  html += '<div class="card"><h3 style="font-size:15px;margin-bottom:10px;">Bunpou-dokkai — '+r.s1.pct+'%</h3>'+renderTypeRows(r.s1.byType)+'</div>';

  html += '<div class="note">Choukai tidak ikut dihitung di skor ini. Anggap angka di atas sebagai radar kekuatan vocab/grammar/reading, bukan prediksi lulus-tidaknya N3 secara keseluruhan.</div>';

  html += '<div class="actions-row"><button class="btn btn-primary" onclick="restart()">Ulangi dari awal</button></div>';

  return html;
}

function render(){
  var app = document.getElementById('app');
  if (state.phase === 'start'){ app.innerHTML = renderStart(); renderHistoryInto(); }
  else if (state.phase === 'exam'){ app.innerHTML = renderExam(); }
  else if (state.phase === 'transition'){ app.innerHTML = renderTransition(); }
  else if (state.phase === 'results'){ app.innerHTML = renderResults(); }
}

render();
</script>
</body>
</html>
